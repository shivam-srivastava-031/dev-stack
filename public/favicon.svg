<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#grad1)"/>
  
  <!-- Stack layers -->
  <g transform="translate(50, 50)">
    <!-- Bottom layer -->
    <rect x="0" y="40" width="80" height="30" rx="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    
    <!-- Middle layer -->
    <rect x="0" y="20" width="80" height="30" rx="4" fill="rgba(255,255,255,0.4)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
    
    <!-- Top layer -->
    <rect x="0" y="0" width="80" height="30" rx="4" fill="url(#grad2)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  </g>
</svg>
